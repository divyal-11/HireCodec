apiVersion: v1
kind: ConfigMap
metadata:
  name: hire-codec-config
data:
  NEXTAUTH_URL: "https://hirecodec.example.com"
  NEXT_PUBLIC_WS_URL: "wss://hirecodec.example.com"
  WS_PORT: "3001"
  WS_CORS_ORIGIN: "https://hirecodec.example.com"
  NEXT_PUBLIC_STUN_URL: "stun:stun.hirecodec.example.com:3478"
