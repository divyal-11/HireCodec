version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: codeinterview
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d codeinterview"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49252:49152-49252/udp"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD:-password}@postgres:5432/codeinterview
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-super-secret-nextauth-key-min-32-chars}
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"

  ws-server:
    build:
      context: ../
      dockerfile: apps/ws-server/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      WS_PORT: 3001
      WS_CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"

  execution-service:
    build:
      context: ../
      dockerfile: packages/execution-service/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      DOCKER_SOCKET: /var/run/docker.sock
      EXECUTION_TIMEOUT_MS: 10000
      EXECUTION_MEMORY_LIMIT_MB: 256
    privileged: true

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - ws-server

volumes:
  postgres_data:
  minio_data:
