# coturn TURN/STUN server configuration
listening-port=3478
tls-listening-port=5349

# Relay settings
min-port=49152
max-port=49252

# Authentication
use-auth-secret
static-auth-secret=coturn-static-auth-secret

# Realm
realm=hirecodec.com

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-multicast-peers
no-loopback-peers
no-cli
